services:
  - type: web
    name: route53-clone
    runtime: docker
    repo: https://github.com/yourusername/route53-clone
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://route53-clone.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: /api
