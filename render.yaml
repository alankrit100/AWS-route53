services:
  - type: web
    name: route53-clone
    runtime: docker
    repo: https://github.com/yourusername/route53-clone
    dockerfilePath: ./Dockerfile
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend-url.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: /api
